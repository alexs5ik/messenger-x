# Local development infrastructure for Messenger X.
# Brings up the data plane the modular monolith expects. Start with:  docker compose up -d
# (Docker is not required to `cargo build`; it is required to run the server end-to-end.)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mx
      POSTGRES_PASSWORD: mx
      POSTGRES_DB: messenger_x
    ports: ["5432:5432"]
    volumes: ["pg_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mx -d messenger_x"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
    command: ["redis-server", "--appendonly", "yes"]
    volumes: ["redis_data:/data"]

  # Kafka in KRaft mode (no ZooKeeper) — durable event log / fan-out.
  kafka:
    image: bitnami/kafka:3.7
    ports: ["9092:9092"]
    environment:
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: "controller,broker"
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: "0@kafka:9093"
      KAFKA_CFG_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_CFG_ADVERTISED_LISTENERS: "PLAINTEXT://localhost:9092"
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes: ["kafka_data:/bitnami/kafka"]

  # NATS — low-latency internal RPC (presence, signaling).
  nats:
    image: nats:2-alpine
    ports: ["4222:4222", "8222:8222"]
    command: ["-js", "-m", "8222"]

  clickhouse:
    image: clickhouse/clickhouse-server:24-alpine
    ports: ["8123:8123", "9000:9000"]
    ulimits:
      nofile: { soft: 262144, hard: 262144 }
    volumes: ["ch_data:/var/lib/clickhouse"]

  # MinIO — S3-compatible object store for encrypted media blobs.
  minio:
    image: minio/minio
    ports: ["9001:9000", "9002:9001"]
    environment:
      MINIO_ROOT_USER: mx
      MINIO_ROOT_PASSWORD: mxminiopass
    command: ["server", "/data", "--console-address", ":9001"]
    volumes: ["minio_data:/data"]

volumes:
  pg_data:
  redis_data:
  kafka_data:
  ch_data:
  minio_data:
